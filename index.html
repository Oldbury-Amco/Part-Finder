<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bentley Parts Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mobile Part Finder</p>
        <h1>Bentley Parts Finder</h1>
        <p class="subtitle">Tap filters to narrow the results. Built for a simple GitHub-hosted mobile view.</p>
      </div>
      <button id="resetAllBtn" class="ghost-btn">Reset all</button>
    </header>

    <main class="layout">
      <section class="panel filters-panel">
        <div class="panel-header">
          <h2>Filters</h2>
          <p>Select one or more options in each section.</p>
        </div>

        <div class="search-wrap">
          <label for="textSearch">Quick search</label>
          <input id="textSearch" type="search" placeholder="Search part no, description, colour..." />
        </div>

        <div id="filtersContainer" class="filters-container"></div>
      </section>

      <section class="panel results-panel">
        <div class="results-toolbar">
          <div>
            <h2>Matching Parts</h2>
            <p id="resultsCount">Loading...</p>
          </div>
          <button id="clearTextBtn" class="ghost-btn">Clear search</button>
        </div>

        <div id="activeFilters" class="active-filters"></div>

        <div id="results" class="results-list"></div>
      </section>
    </main>
  </div>

  <template id="resultCardTemplate">
    <article class="result-card">
      <div class="result-card-top">
        <div>
          <div class="part-number"></div>
          <div class="part-description"></div>
        </div>
        <button class="copy-btn" type="button">Copy</button>
      </div>

      <div class="meta-grid"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
