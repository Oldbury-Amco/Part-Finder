<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Part Finder</title>
  <meta name="description" content="Mobile-friendly part finder for GitHub Pages" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__eyebrow">Part Finder</div>
      <h1>Part Selector</h1>
      <p>Select buttons below to narrow the list. Results show part number and description only.</p>
      <div class="hero__actions">
        <button id="resetAllBtn" class="btn btn--ghost">Reset All</button>
      </div>
    </header>

    <main class="content">
      <section class="panel panel--summary">
        <div class="summary">
          <div class="summary__item">
            <span class="summary__label">Results</span>
            <strong id="resultCount">0</strong>
          </div>
          <div class="summary__item">
            <span class="summary__label">Active Filters</span>
            <div id="activeChips" class="chips chips--small"></div>
          </div>
        </div>
      </section>

      <section id="filters" class="filters"></section>

      <section class="panel panel--results">
        <div class="results-header">
          <h2>Matching Parts</h2>
          <div id="resultsNote" class="results-note"></div>
        </div>
        <div id="results" class="results"></div>
      </section>
    </main>
  </div>

  <template id="filterSectionTemplate">
    <section class="panel filter-panel">
      <div class="filter-panel__head">
        <div>
          <div class="filter-step"></div>
          <h3 class="filter-title"></h3>
        </div>
        <button class="clear-filter btn btn--tiny btn--ghost" type="button">Clear</button>
      </div>
      <div class="button-grid"></div>
    </section>
  </template>

  <template id="resultCardTemplate">
    <article class="result-card">
      <div class="result-card__top">
        <div>
          <div class="result-card__label">Part Number</div>
          <div class="result-card__number"></div>
        </div>
        <button class="btn btn--tiny copy-btn" type="button">Copy</button>
      </div>
      <div class="result-card__label">Description</div>
      <div class="result-card__description"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
