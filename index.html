<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMCO Part Finder</title>
  <meta name="theme-color" content="#b71c1c" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__brand">
        <div class="hero__logo">A</div>
        <div>
          <p class="eyebrow">Mobile Part Lookup</p>
          <h1>AMCO Part Finder</h1>
        </div>
      </div>
      <p class="hero__text">Select a model to instantly view matching part numbers and descriptions.</p>
    </header>

    <main class="main">
      <section class="panel controls">
        <div class="controls__top">
          <div>
            <p class="section-label">Step 1</p>
            <h2>Choose model</h2>
          </div>
          <button id="clearFilters" class="ghost-btn" type="button">Clear</button>
        </div>

        <div id="modelButtons" class="chip-grid" aria-label="Model options"></div>

        <div class="search-wrap">
          <label for="searchInput" class="section-label">Step 2</label>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="Search part number or description"
            autocomplete="off"
          />
        </div>
      </section>

      <section class="panel results">
        <div class="results__top">
          <div>
            <p class="section-label">Results</p>
            <h2 id="resultsTitle">All parts</h2>
          </div>
          <div id="resultCount" class="count-pill">0 parts</div>
        </div>

        <div id="activeFilters" class="active-filters"></div>

        <div id="resultsList" class="results-list"></div>
        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-state__icon">⌕</div>
          <h3>No matching parts found</h3>
          <p>Try another model or adjust the search text.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
